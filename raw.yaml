// 填入文件内容# ========================
# 策略组定义 (Proxy Groups)
# ========================
proxy-groups:
  # 1. 核心选择与测试
  - name: 🚀 节点选择
    type: select
    proxies: [🇭🇰 香港-故转, 🇹🇼 台湾-故转, 🇯🇵 日本-故转, 🇸🇬 新加坡-故转, 🇺🇸 美国-故转, DIRECT]

  - name: ⚡️ 自动选择
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    url: 'http://www.gstatic.com/generate_204'

  # 2. AI 生产力 (AI 组)
  - name: 🤖 AI
    type: select
    proxies: [🇺🇸 美国-故转, 🇯🇵 日本-故转, 🇸🇬 新加坡-故转, 🚀 节点选择]

  # 3. 厂商服务与硬件
  - name: 🔍 Google
    type: select
    proxies: [🇭🇰 香港-故转, 🇸🇬 新加坡-故转, 🚀 节点选择]

  - name: 🍎 Apple
    type: select
    proxies: [DIRECT, 🇭🇰 香港-故转, 🚀 节点选择]

  - name: 💻 Microsoft
    type: select
    proxies: [DIRECT, 🇭🇰 香港-故转, 🇺🇸 美国-故转]

  - name: 🟢 Nvidia
    type: select
    proxies: [🇺🇸 美国-故转, 🚀 节点选择, DIRECT]

  # 4. 内容与社交
  - name: 📺 Stream Media
    type: select
    proxies: [🇭🇰 香港-故转, 🇹🇼 台湾-故转, 🇸🇬 新加坡-故转, 🇺🇸 美国-故转, 🇯🇵 日本-故转]

  - name: 💬 社交
    type: select
    proxies: [🇭🇰 香港-故转, 🇸🇬 新加坡-故转, 🇺🇸 美国-故转, 🇯🇵 日本-故转]

  - name: 🎮 Game
    type: select
    proxies: [🇭🇰 香港-故转, 🇹🇼 台湾-故转, 🇯🇵 日本-故转, DIRECT]

  - name: 🧡 Reddit
    type: select
    proxies: [🇺🇸 美国-故转, 🇯🇵 日本-故转, 🚀 节点选择]

  # 5. 代码与基础设施
  - name: 🐱 GitHub
    type: select
    proxies: [🇭🇰 香港-故转, 🇺🇸 美国-故转, 🇸🇬 新加坡-故转, DIRECT]

  - name: 🐋 Docker
    type: select
    proxies: [🇭🇰 香港-故转, 🇺🇸 美国-故转, 🇸🇬 新加坡-故转, DIRECT]

  - name: ☁️ Cloudflare
    type: select
    proxies: [🇭🇰 香港-故转, 🇺🇸 美国-故转, DIRECT]

  - name: 🐍 Python
    type: select
    proxies: [🇭🇰 香港-故转, 🇺🇸 美国-故转, DIRECT]

  # 6. 地区故障转移逻辑组 (由 Sub-Store 自动填充节点)
  - name: 🇭🇰 香港-故转
    type: fallback
    proxies: [🇭🇰 香港-自动, 🇭🇰 香港-手动]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇭🇰 香港-自动
    type: url-test
    include-all: true
    filter: "广港|香港|HK|Hong Kong|🇭🇰|HongKong"

  - name: 🇭🇰 香港-手动
    type: select
    include-all: true
    filter: "广港|香港|HK|Hong Kong|🇭🇰|HongKong"

  - name: 🇹🇼 台湾-故转
    type: fallback
    proxies: [🇹🇼 台湾-自动, 🇹🇼 台湾-手动]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇹🇼 台湾-自动
    type: url-test
    include-all: true
    filter: "广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan"

  - name: 🇹🇼 台湾-手动
    type: select
    include-all: true
    filter: "广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan"

  - name: 🇯🇵 日本-故转
    type: fallback
    proxies: [🇯🇵 日本-自动, 🇯🇵 日本-手动]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇯🇵 日本-自动
    type: url-test
    include-all: true
    filter: "广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan"

  - name: 🇯🇵 日本-手动
    type: select
    include-all: true
    filter: "广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan"

  - name: 🇸🇬 新加坡-故转
    type: fallback
    proxies: [🇸🇬 新加坡-自动, 🇸🇬 新加坡-手动]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇸🇬 新加坡-自动
    type: url-test
    include-all: true
    filter: "广新|新加坡|SG|坡|狮城|🇸🇬|Singapore"

  - name: 🇸🇬 新加坡-手动
    type: select
    include-all: true
    filter: "广新|新加坡|SG|坡|狮城|🇸🇬|Singapore"

  - name: 🇺🇸 美国-故转
    type: fallback
    proxies: [🇺🇸 美国-自动, 🇺🇸 美国-手动]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300

  - name: 🇺🇸 美国-自动
    type: url-test
    include-all: true
    filter: "广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States"

  - name: 🇺🇸 美国-手动
    type: select
    include-all: true
    filter: "广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States"

  # 7. 兜底策略
  - name: 🇨🇳 国内兜底
    type: select
    proxies: [DIRECT, 🚀 节点选择]

  - name: 🌐 国外兜底
    type: select
    proxies: [🚀 节点选择, 🇸🇬 新加坡-故转, 🇺🇸 美国-故转]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [🌐 国外兜底, DIRECT]

# ========================
# 路由规则 (Rules)
# ========================
rules:
  # 1. 广告拦截
  - RULE-SET,AWAvenue_Domain,REJECT

  # 2. 本地/私有网络
  - RULE-SET,Private_Domain,DIRECT
  - RULE-SET,Private_IP,DIRECT,no-resolve

  # 3. 个人自定义规则
  - RULE-SET,My_Domain,DIRECT
  - RULE-SET,Test_Domain,Test
  - RULE-SET,MyDl_Domain,🌐 国外兜底

  # 4. AI 规则集
  - RULE-SET,ChatGPT_Domain,🤖 AI
  - RULE-SET,Groq_Domain,🤖 AI
  - RULE-SET,Meta_AI_Domain,🤖 AI
  - RULE-SET,Perplexity_Domain,🤖 AI
  - RULE-SET,Copilot_Domain,🤖 AI
  - RULE-SET,Gemini_Domain,🤖 AI

  # 5. 流媒体
  - RULE-SET,YouTube_Domain,📺 Stream Media
  - RULE-SET,Netflix_Domain,📺 Stream Media
  - RULE-SET,Netflix_IP,📺 Stream Media,no-resolve
  - RULE-SET,TikTok_Domain,📺 Stream Media
  - RULE-SET,Disney_Domain,📺 Stream Media
  - RULE-SET,HBO_Domain,📺 Stream Media
  - RULE-SET,Spotify_Domain,📺 Stream Media
  - RULE-SET,Amazon_Domain,📺 Stream Media
  - RULE-SET,TMDB_Domain,📺 Stream Media

  # 6. 社交平台
  - RULE-SET,Telegram_Domain,💬 社交
  - RULE-SET,Telegram_IP,💬 社交,no-resolve
  - RULE-SET,Twitter_Domain,💬 社交
  - RULE-SET,Twitter_IP,💬 社交,no-resolve
  - RULE-SET,Facebook_Domain,💬 社交,no-resolve
  - RULE-SET,Facebook_IP,💬 社交,no-resolve
  - RULE-SET,Instagram_Domain,💬 社交,no-resolve
  - RULE-SET,Discord_Domain,💬 社交,no-resolve
  - RULE-SET,Slack_Domain,💬 社交
  - RULE-SET,Reddit_Domain,🧡 Reddit

  # 7. 开发者工具
  - RULE-SET,GitHub_Domain,🐱 GitHub
  - RULE-SET,Python_Domain,🐍 Python
  - RULE-SET,Docker_Domain,🐋 Docker
  - RULE-SET,Cloudflare_Domain,☁️ Cloudflare
  - RULE-SET,Cloudflare_IP,☁️ Cloudflare,no-resolve

  # 8. 厂商规则
  - RULE-SET,Google_Domain,🔍 Google
  - RULE-SET,Microsoft_Domain,💻 Microsoft
  - RULE-SET,Apple_CN_Domain,🍎 Apple
  - RULE-SET,Apple_Domain,🍎 Apple
  - RULE-SET,Nvidia_Domain,🟢 Nvidia

  # 9. 游戏规则
  - RULE-SET,Steam_Domain,🎮 Game

  # 10. 国内兜底
  - RULE-SET,GameDownloadCN_No_Resolve,🇨🇳 国内兜底,no-resolve
  - RULE-SET,China_Domain,🇨🇳 国内兜底
  - RULE-SET,China_IP,🇨🇳 国内兜底,no-resolve

  # 11. 最终兜底
  - RULE-SET,Proxy_Domain,🌐 国外兜底
  - MATCH,🐟 漏网之鱼

